name: Sækja KKÍ leikjagögn

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Sækja kóða
        uses: actions/checkout@v4

      - name: Setja upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setja upp Python pakka
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Keyra scraper
        run: python scraper.py

      - name: Vista gögn á GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json
          git diff --staged --quiet || git commit -m "Uppfæra leikjagögn $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
